# ──────────────────────────────────────────────
# Edit these lines for your project
# ──────────────────────────────────────────────
[project]
name = "navi-sanitize"
site_name = "navi-sanitize"
description = "Deterministic input sanitization for untrusted text"
site_url = "https://project-navi.github.io/navi-sanitize"
repo_url = "https://github.com/Project-Navi/navi-sanitize"
repo_name = "Project-Navi/navi-sanitize"
copyright = "Copyright 2025-2026 Nelson Spence"
extra_css = ["stylesheets/navi.css"]

# ──────────────────────────────────────────────
# Edit nav to match your docs structure
# ──────────────────────────────────────────────
nav = [
  {"Home" = "index.md"},
  {"Getting Started" = [
    {"Quickstart" = "getting-started/quickstart.md"},
  ]},
  {"How-To Guides" = [
    {"Writing Custom Escapers" = "how-to/writing-custom-escapers.md"},
  ]},
  {"Explanation" = [
    {"Why This Matters" = "explanation/why-this-matters.md"},
    {"Pipeline Architecture" = "explanation/pipeline-architecture.md"},
    {"Threat Model" = "explanation/threat-model.md"},
    {"Performance" = "explanation/performance.md"},
    {"Comparison" = "explanation/comparison.md"},
  ]},
  {"Reference" = [
    {"API Reference" = "reference/api.md"},
    {"Character Reference" = "reference/character-reference.md"},
    {"Changelog" = "reference/changelog.md"},
  ]},
]

# ──────────────────────────────────────────────
# Everything below is shared brand config
# You should not need to change these
# ──────────────────────────────────────────────
[project.theme]
logo = "assets/logo.png"
favicon = "assets/favicon.png"

[project.theme.palette]
scheme = "slate"

[project.theme.features]
navigation_sections = true
navigation_expand = true
navigation_top = true
content_code_copy = true
toc_integrate = true

[project.markdown_extensions.admonition]
[project.markdown_extensions.tables]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.plugins.search]
