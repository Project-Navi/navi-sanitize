name: OpenSSF Scorecard

on:
  schedule:
    - cron: "0 6 * * 6" # Saturdays at 06:00 UTC
  push:
    branches: [main]

permissions: {}

jobs:
  scorecard:
    uses: Project-Navi/.github/.github/workflows/scorecard.yml@83f5a6860e88af77ecebda9d90836c6e7caec159
    permissions:
      contents: read
      security-events: write
      id-token: write
      actions: read
    secrets: inherit
