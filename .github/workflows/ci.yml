name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Ruff format
        run: uv run ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Mypy
        run: uv run mypy --strict src/navi_sanitize/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          enable-cache: true
      - name: Install dependencies
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: uv sync --frozen --python "$PYTHON_VERSION"
      - name: Run tests
        run: uv run pytest tests/ -v --benchmark-disable

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: pip-audit
        run: uvx pip-audit==2.9.0

  build:
    needs: [lint, typecheck, test, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          enable-cache: true
      - name: Build wheel
        run: uv build
      - name: Smoke test
        run: |
          uv venv .smoke-venv
          .smoke-venv/bin/pip install dist/*.whl
          .smoke-venv/bin/python -c "
          from navi_sanitize import clean, walk, jinja2_escaper, path_escaper
          assert clean('hello') == 'hello'
          assert walk({'k': 'v'}) == {'k': 'v'}
          print('Smoke test passed')
          "
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheel
          path: dist/*.whl
