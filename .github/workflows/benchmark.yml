name: Benchmark

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run benchmarks
        run: uv run pytest tests/test_benchmark.py -v
      - uses: actions/upload-artifact@v4
        with:
          name: benchmarks
          path: .benchmarks/
          retention-days: 30
