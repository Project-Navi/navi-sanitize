name: Reusable Build (SLSA L3)

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string

permissions: {}

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b  # v2.15.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098  # v5.4.2
        with:
          enable-cache: true

      - name: Build wheel and sdist
        run: uv build

      - name: Smoke test
        run: |
          uv venv .smoke-venv
          uv pip install dist/*.whl --python .smoke-venv/bin/python
          .smoke-venv/bin/python -c "
          from navi_sanitize import clean, walk, jinja2_escaper, path_escaper
          assert clean('hello') == 'hello'
          assert walk({'k': 'v'}) == {'k': 'v'}
          print('Smoke test passed')
          "

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11  # v0.23.0
        with:
          path: .
          format: cyclonedx-json
          output-file: navi-sanitize.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@17ae1740179002c89186b61233e0f892c3118b11  # v0.23.0
        with:
          path: .
          format: spdx-json
          output-file: navi-sanitize.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: |
            dist/*
            navi-sanitize.cdx.json
            navi-sanitize.spdx.json

      - name: Upload dist artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: dist
          path: dist/

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: sbom
          path: |
            navi-sanitize.cdx.json
            navi-sanitize.spdx.json
